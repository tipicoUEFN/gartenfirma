<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>PR Gartenservice</title>
    <script>
      // Redirect unknown GitHub Pages paths back to the SPA entry with encoded route.
      const pathSegmentsToKeep = 1
      const l = window.location
      const newPath = l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/')
      const route = l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~')
      const query = l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : ''
      l.replace(`${l.protocol}//${l.hostname}${l.port ? ':' + l.port : ''}${newPath}/?/${route}${query}${l.hash}`)
    </script>
  </head>
  <body></body>
</html>
